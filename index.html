<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>愉景灣通勤助手｜修正C9碼頭到達時間</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f8f3e9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #fffef7; border-radius: 32px; box-shadow: 0 12px 28px rgba(0,0,0,0.1); padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; }
        .card-header { font-size: 1.3rem; font-weight: 700; color: #7a5b3b; border-left: 5px solid #d9a13b; padding-left: 12px; margin-bottom: 1rem; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 1rem; }
        .flex-col { flex: 1; min-width: 120px; }
        label { font-size: 0.7rem; font-weight: 600; color: #8b6b42; display: block; margin-bottom: 4px; }
        select, input, button { width: 100%; padding: 10px 14px; border-radius: 40px; border: 1px solid #e2d6c0; background: #ffffff; font-size: 0.9rem; }
        button { background: #d9a13b; color: white; font-weight: 600; border: none; cursor: pointer; }
        .result-group { margin-bottom: 16px; border-radius: 24px; overflow: hidden; }
        .route-card { padding: 12px 16px; background: #fef2e0; }
        .route-title { font-weight: 800; margin-bottom: 8px; font-size: 1rem; }
        .trip-line { margin: 6px 0; font-size: 0.85rem; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 6px; }
        .info { color: #2b6e3c; background: #e6f7e6; padding: 4px 10px; border-radius: 16px; display: inline-block; }
        .error { color: #c00; background: #ffe6e6; padding: 12px; border-radius: 24px; margin-bottom: 12px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:#fffef7; max-width:90%; width:500px; border-radius:32px; padding:20px; max-height:80%; overflow:auto; }
        .close-btn { float:right; font-size:24px; cursor:pointer; }
        .setting-group { background: #f3ede2; border-radius: 24px; padding: 12px; margin-top: 12px; display: none; }
        .setting-group.show { display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">🚌 行程規劃</div>
        <div class="flex-row">
            <div class="flex-col"><label>起點</label>
                <select id="startPoint">
                    <option value="倚濤軒">倚濤軒</option>
                    <option value="北商場">北商場</option>
                    <option value="愉景灣碼頭">愉景灣碼頭</option>
                    <option value="翠山閣">翠山閣</option>
                    <option value="中環">中環</option>
                    <option value="東涌">東涌</option>
                    <option value="欣澳">欣澳</option>
                </select>
            </div>
            <div class="flex-col"><label>終點</label>
                <select id="endPoint">
                    <option value="中環">中環</option>
                    <option value="倚濤軒">倚濤軒</option>
                    <option value="北商場">北商場</option>
                    <option value="愉景灣碼頭">愉景灣碼頭</option>
                    <option value="翠山閣">翠山閣</option>
                    <option value="東涌">東涌</option>
                    <option value="欣澳">欣澳</option>
                </select>
            </div>
        </div>
        <div class="flex-row">
            <div class="flex-col"><label>日期類型</label>
                <select id="dayType">
                    <option value="weekday">週一至五</option>
                    <option value="saturday">週六</option>
                    <option value="sunday">週日／公假</option>
                </select>
            </div>
            <div class="flex-col"><label>查詢時間</label><input type="time" id="queryTime" value="08:00"></div>
            <div class="flex-col"><button id="searchBtn">🔍 查詢班次</button></div>
        </div>
        <div class="flex-row">
            <button id="setNowBtn">🕒 設為目前時間</button>
            <button id="viewFullScheduleBtn">📋 全日班次查詢</button>
            <button id="toggleSettingsBtn">⚙️ 高級設置</button>
        </div>
        <div id="advancedSettings" class="setting-group">
            <label>換乘步行緩衝 (分鐘)</label>
            <input type="number" id="transferBuffer" value="3" step="1" min="0">
            <label>行車時間自訂 (分鐘)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <div><label>C9 倚濤軒→碼頭</label><input type="number" id="t_c9_home_pier" value="4"></div>
                <div><label>C9 倚濤軒→北商場</label><input type="number" id="t_c9_home_north" value="16"></div>
                <div><label>C9 北商場→碼頭</label><input type="number" id="t_c9_north_pier" value="9"></div>
                <div><label>C9 北商場→翠山閣</label><input type="number" id="t_c9_north_green" value="5"></div>
                <div><label>C9 翠山閣→碼頭</label><input type="number" id="t_c9_green_pier" value="4"></div>
                <div><label>C9 翠山閣→倚濤軒</label><input type="number" id="t_c9_green_home" value="8"></div>
                <div><label>渡輪 中環↔碼頭</label><input type="number" id="t_ferry" value="25"></div>
                <div><label>DB08R 行車時間</label><input type="number" id="t_db08r" value="35"></div>
                <div><label>01R 碼頭→東涌</label><input type="number" id="t_01r_pier_tc" value="23"></div>
                <div><label>01R 東涌→碼頭</label><input type="number" id="t_01r_tc_pier" value="25"></div>
                <div><label>01R 東涌→翠山閣</label><input type="number" id="t_01r_tc_green" value="18"></div>
                <div><label>01A 東涌→翠山閣</label><input type="number" id="t_01a_tc_green" value="18"></div>
                <div><label>03R 碼頭→欣澳</label><input type="number" id="t_03r_pier_sb" value="20"></div>
                <div><label>03R 欣澳→碼頭</label><input type="number" id="t_03r_sb_pier" value="20"></div>
                <div><label>03R 欣澳→翠山閣</label><input type="number" id="t_03r_sb_green" value="18"></div>
                <div><label>03P 欣澳→翠山閣</label><input type="number" id="t_03p_sb_green" value="18"></div>
            </div>
            <button id="resetTimesBtn">重置為預設</button>
            <div class="flex-row" style="margin-top:8px;">
                <button id="presetWeekday">📆 平日方案</button>
                <button id="presetSaturday">📆 週六方案</button>
                <button id="presetSunday">📆 假日方案</button>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-header">📋 行程結果</div>
        <div id="resultList">請選擇起點、終點及時間後查詢</div>
    </div>
</div>

<!-- 全日班次模態框 -->
<div id="scheduleModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3>📅 全日班次查詢</h3>
        <label>路線</label>
        <select id="fullRouteSelect">
            <option value="c9_home">C9 倚濤軒開</option>
            <option value="c9_north">C9 北商場開</option>
            <option value="ferry_to_db">渡輪 中環→愉景灣</option>
            <option value="ferry_to_central">渡輪 愉景灣→中環</option>
            <option value="db08r_pier">DB08R 愉景灣→中環</option>
            <option value="db08r_central">DB08R 中環→愉景灣</option>
            <option value="bus01r_pier_tc">01R 愉景灣→東涌</option>
            <option value="bus01r_tc_pier">01R 東涌→愉景灣</option>
            <option value="bus01a_tc_north">01A 東涌→北商場</option>
            <option value="bus03r_pier_sb">03R 愉景灣→欣澳</option>
            <option value="bus03r_sb_db">03R 欣澳→愉景灣</option>
            <option value="bus03p_sb_north">03P 欣澳→北商場</option>

        <label>日期類型</label>

            <option value="saturday">週六</option>
            <option value="sunday">週日／公假</option>
        </select>
        <button id="showFullScheduleBtn">顯示班次</button>
        <div id="fullScheduleResult" style="margin-top:16px; max-height:300px; overflow-y:auto;"></div>
    </div>
</div>

    // ---------- 2. 行車時間 ----------
    let travel = {
        c9_home_pier: 4, c9_home_north: 16, c9_north_pier: 9, c9_north_green: 5,
        c9_green_pier: 4, c9_green_home: 8, ferry: 25, db08r: 35,
        o1r_pier_tc: 23, o1r_tc_pier: 25, o1r_tc_green: 18, o1a_tc_green: 18,
        o3r_pier_sb: 20, o3r_sb_pier: 20, o3r_sb_green: 18, o3p_sb_green: 18
    };
    let transferBuffer = 3;

    // ---------- 3. 工具函數 ----------
    const colorPalette = ["#fff3e0","#e8f4f8","#e6f7e6","#fce4ec","#f1e0f7"];
    let colorIndex = 0;
    function getNextColor() { return colorPalette[colorIndex++ % colorPalette.length]; }
    function resetColorIndex() { colorIndex = 0; }

    function timeToMins(t) { let [h,m]=t.split(':'); return parseInt(h)*60+parseInt(m); }
    function minsToTime(m) { let h=Math.floor(m/60)%24; let mm=m%60; return `${h.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`; }
    function findNextTwo(schedule, afterMins) {
        if (!schedule || !schedule.length) return [];
        let valid = schedule.filter(t => timeToMins(t) >= afterMins).sort();
        return valid.slice(0,2);
    }
    // 特別用於 C9 北商場→碼頭：找到出發時間，使得出發時間 + 行車時間 >= afterMins
    function findNextC9ForPier(c9Sched, afterMins, travelMin) {
        if (!c9Sched || !c9Sched.length) return [];
        let valid = c9Sched.filter(t => timeToMins(t) + travelMin >= afterMins).sort();
        return valid.slice(0,2);
    }

    function saveSettings() {
        localStorage.setItem("travelTimes", JSON.stringify(travel));
        localStorage.setItem("transferBuffer", transferBuffer);
        for(let k in travel) {
            let el = document.getElementById(`t_${k}`);
            if(el) el.value = travel[k];
        }
        document.getElementById("transferBuffer").value = transferBuffer;
    }
    function loadSettings() {
        let saved = localStorage.getItem("travelTimes");
        if(saved) { try { Object.assign(travel, JSON.parse(saved)); } catch(e){} }
        let buf = localStorage.getItem("transferBuffer");
        if(buf) transferBuffer = parseInt(buf);
        document.getElementById("transferBuffer").value = transferBuffer;
        for(let k in travel) {
            let el = document.getElementById(`t_${k}`);
            if(el) el.value = travel[k];
        }
    }
    function updateFromUI() {
        travel.c9_home_pier = parseInt(document.getElementById("t_c9_home_pier").value);
        travel.c9_home_north = parseInt(document.getElementById("t_c9_home_north").value);
        travel.c9_north_pier = parseInt(document.getElementById("t_c9_north_pier").value);
        travel.c9_north_green = parseInt(document.getElementById("t_c9_north_green").value);
        travel.c9_green_pier = parseInt(document.getElementById("t_c9_green_pier").value);
        travel.c9_green_home = parseInt(document.getElementById("t_c9_green_home").value);
        travel.ferry = parseInt(document.getElementById("t_ferry").value);
        travel.db08r = parseInt(document.getElementById("t_db08r").value);
        travel.o1r_pier_tc = parseInt(document.getElementById("t_01r_pier_tc").value);
        travel.o1r_tc_pier = parseInt(document.getElementById("t_01r_tc_pier").value);

        travel.o3r_pier_sb = parseInt(document.getElementById("t_03r_pier_sb").value);
        travel.o3r_sb_pier = parseInt(document.getElementById("t_03r_sb_pier").value);

    // ---------- 4. 核心查詢 ----------
    function queryTrip(start, end, day, queryMins) {
        let groups = [];
        function addGroup(html) { groups.push({ html, color: getNextColor() }); }

        // --- 中環出發 (含 DB08R) ---
        if (start === "中環") {
            let ferry_sched = ferryToDB[day];
            let ferry_times = findNextTwo(ferry_sched, queryMins);
            if (ferry_times.length) {
                if (end === "愉景灣碼頭") {
                    addGroup(`<div class="route-title">🚏 中環 → 愉景灣碼頭 (渡輪直達)</div>${ferry_times.map(t=>`<div class="trip-line">⛴️ 渡輪 ${t} (行車${travel.ferry}分鐘)</div>`).join("")}`);
                } else if (end === "倚濤軒" || end === "翠山閣" || end === "北商場") {
                    let c9_sched = (end === "北商場") ? c9Home[day] : c9North[day];
                    if (c9_sched) {
                        let items = [];
                        for (let ft of ferry_times) {
                            let arrivePier = timeToMins(ft) + travel.ferry;
                            let earliestBoard = arrivePier + transferBuffer;
                            // 對於北商場，我們直接用 findNextTwo 因為那是從碼頭直接搭 C9 前往北商場？不，北商場是終點，我們需要找 c9Home 的班次，但那是從倚濤軒開往北商場，途經碼頭。但中環→北商場的換乘是在碼頭轉乘 C9 去北商場，應該用 c9Home 並計算 C9 從倚濤軒出發後到達碼頭的時間 (travel.c9_home_pier) 還是？實際上，中環到北商場，最佳方式是坐渡輪到碼頭，然後轉乘 C9 從碼頭去北商場。但 c9Home 是從倚濤軒開往北商場，它會經過碼頭，所以乘客在碼頭可以上車（前提是 C9 到達碼頭的時間 >= 乘客到達時間）。C9 從倚濤軒開出後 4 分鐘到達碼頭，所以我們需要找 c9Home 的出發時間，使得出發時間 + travel.c9_home_pier >= earliestBoard。
                            if (end === "北商場") {
                                let c9_times = c9_sched.filter(t => timeToMins(t) + travel.c9_home_pier >= earliestBoard).sort().slice(0,2);
                                if (c9_times.length) {
                                    let c9Str = c9_times.map(ct => {
                                        let wait = timeToMins(ct) + travel.c9_home_pier - arrivePier;
                                        return `${ct} (候車${wait}分鐘)`;
                                    }).join(" 或 ");
                                    items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ 轉乘 C9（倚濤軒→北商場）：${c9Str}`);
                                } else {
                                    items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ ❌ 之後無 C9 班次可銜接`);
                                }
                            } else {
                                // 倚濤軒 或 翠山閣：使用 c9North，且需要計算 C9 從北商場出發後到達碼頭的時間 (travel.c9_north_pier)
                                let c9_times = c9_sched.filter(t => timeToMins(t) + travel.c9_north_pier >= earliestBoard).sort().slice(0,2);
                                if (c9_times.length) {
                                    let destLabel = end === "倚濤軒" ? "倚濤軒" : "翠山閣";
                                    let c9Str = c9_times.map(ct => {
                                        let wait = timeToMins(ct) + travel.c9_north_pier - arrivePier;
                                        return `${ct} (候車${wait}分鐘)`;
                                    }).join(" 或 ");
                                    items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ 轉乘 C9（北商場→${destLabel}）：${c9Str}`);
                                } else {
                                    items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ ❌ 之後無 C9 班次可銜接`);
                                }
                            }
                        }
                        if (items.length) addGroup(`<div class="route-title">🚏 中環 → ${end} (碼頭換乘 C9)</div>${items.map(i=>`<div class="trip-line">${i}</div>`).join("")}`);
                    }
                } else if (end === "東涌") {
                    let bus_sched = bus01rPierToTc[day];
                    if (bus_sched) {
                        let items = [];
                        for (let ft of ferry_times) {
                            let arrivePier = timeToMins(ft) + travel.ferry;
                            let earliestBus = arrivePier + transferBuffer;
                            let bus_times = findNextTwo(bus_sched, earliestBus);
                            if (bus_times.length) {
                                let busStr = bus_times.map(bt => `${bt} (候車${timeToMins(bt)-arrivePier}分鐘)`).join(" 或 ");
                                items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ 轉乘 01R 往東涌：${busStr}`);
                            } else {
                                items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ ❌ 之後無 01R 班次可銜接`);
                            }
                        }
                        if (items.length) addGroup(`<div class="route-title">🚏 中環 → 東涌 (碼頭換乘 01R)</div>${items.map(i=>`<div class="trip-line">${i}</div>`).join("")}`);
                    }
                } else if (end === "欣澳") {
                    let bus_sched = bus03rPierToSb[day];
                    if (bus_sched) {
                        let items = [];
                        for (let ft of ferry_times) {
                            let arrivePier = timeToMins(ft) + travel.ferry;
                            let earliestBus = arrivePier + transferBuffer;
                            let bus_times = findNextTwo(bus_sched, earliestBus);
                            if (bus_times.length) {
                                let busStr = bus_times.map(bt => `${bt} (候車${timeToMins(bt)-arrivePier}分鐘)`).join(" 或 ");
                                items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ 轉乘 03R 往欣澳：${busStr}`);
                            } else {
                                items.push(`⛴️ 渡輪 ${ft} → 碼頭 ${minsToTime(arrivePier)}<br>↳ ❌ 之後無 03R 班次可銜接`);
                            }
                        }
                        if (items.length) addGroup(`<div class="route-title">🚏 中環 → 欣澳 (碼頭換乘 03R)</div>${items.map(i=>`<div class="trip-line">${i}</div>`).join("")}`);
                    }
                }
            } else {
                // 無渡輪 -> DB08R
                let db08r_sched = db08rFromCentral;
                let db08r_times = findNextTwo(db08r_sched, queryMins);
                if (db08r_times.length) {
                    if (end === "愉景灣碼頭") {
                        addGroup(`<div class="route-title">🚏 中環 → 愉景灣碼頭 (DB08R 深夜巴士)</div>${db08r_times.map(t=>`<div class="trip-line">🚌 DB08R ${t} (行車${travel.db08r}分鐘，直達愉景灣)</div>`).join("")}`);
                    } else {
                        addGroup(`<div class="route-title">🚏 中環 → ${end} (DB08R 深夜巴士直達)</div>${db08r_times.map(t=>`<div class="trip-line">🚌 DB08R ${t} (行車${travel.db08r}分鐘，直達${end})</div>`).join("")}`);
                    }
                } else {
                    addGroup(`<div class="route-title">🚏 中環 → ${end}</div><div class="trip-line">❌ 深夜時段無 DB08R 班次，請選擇其他時間</div>`);
                }
            }
        }

        // --- 愉景灣碼頭 → 中環 (渡輪直達) ---
        if (start === "愉景灣碼頭" && end === "中環") {
            let sched = ferryToCentral[day];
            let times = findNextTwo(sched, queryMins);
            if (times.length) addGroup(`<div class="route-title">🚏 愉景灣碼頭 → 中環 (渡輪直達)</div>${times.map(t=>`<div class="trip-line">⛴️ 渡輪 ${t} (行車${travel.ferry}分鐘)</div>`).join("")}`);
            else addGroup(`<div class="route-title">🚏 愉景灣碼頭 → 中環 (渡輪直達)</div><div class="trip-line">❌ 查詢時間後無渡輪班次</div>`);
        }

        // --- 愉景灣碼頭 ↔ 倚濤軒 (C9直達) ---
        if (start === "愉景灣碼頭" && end === "倚濤軒") {
            let sched = c9North[day];
            let times = findNextTwo(sched, queryMins);
            if (times.length) addGroup(`<div class="route-title">🚏 愉景灣碼頭 → 倚濤軒 (C9直達)</div>${times.map(t=>`<div class="trip-line">🚌 C9 ${t} (行車${travel.c9_north_pier}分鐘)</div>`).join("")}`);
            else addGroup(`<div class="route-title">🚏 愉景灣碼頭 → 倚濤軒 (C9直達)</div><div class="trip-line">❌ 查詢時間後無 C9 班次</div>`);
        }
        if (start === "倚濤軒" && end === "愉景灣碼頭") {
            let sched = c9Home[day];
            let times = findNextTwo(sched, queryMins);
            if (times.length) addGroup(`<div class="route-title">🚏 倚濤軒 → 愉景灣碼頭 (C9直達)</div>${times.map(t=>`<div class="trip-line">🚌 C9 ${t} (行車${travel.c9_home_pier}分鐘)</div>`).join("")}`);
            else addGroup(`<div class="route-title">🚏 倚濤軒 → 愉景灣碼頭 (C9直達)</div><div class="trip-line">❌ 查詢時間後無 C9 班次</div>`);
        }

                            items.push(`01R ${t} → 碼頭 ${minsToTime(arrivePier)} 轉乘 C9：${c9Str}`);

                }

        if (start === "倚濤軒" && end === "東涌") {

                    if (bus_times.length) {

                    } else {
                        items.push(`🚌 C9 ${c9t} → 碼頭 ${minsToTime(arrivePier)}<br>↳ ❌ 之後無 03R 班次`);

                else addGroup(`<div class="route-title">🚏 倚濤軒 → 欣澳 (碼頭換乘 03R)</div><div class="trip-line">❌ 查詢時間後無 C9 班次</div>`);
            }
        }

        if (groups.length === 0) return "<div>無合適班次或路線未支援，請嘗試其他起終點。</div>";
        return groups.map(g => `<div class="result-group"><div class="route-card" style="background-color: ${g.color};">${g.html}</div></div>`).join("");
    }

    // ---------- 5. 全日班次查詢 ----------
    const fullMap = {
        c9_home: c9Home, c9_north: c9North,
        ferry_to_db: ferryToDB, ferry_to_central: ferryToCentral,
        db08r_pier: db08rFromPier, db08r_central: db08rFromCentral,
        bus01r_pier_tc: bus01rPierToTc, bus01r_tc_pier: bus01rTcToPier,
        bus01a_tc_north: bus01aTcToNorth,
        bus03r_pier_sb: bus03rPierToSb, bus03r_sb_db: bus03rSbToDb,
        bus03p_sb_north: bus03pSbToNorth
    };
    function showFullSchedule(route, day) {
        let data = fullMap[route];
        if (!data) return "無此路線";
        let times = data[day];
        if (!times || times.length === 0) return "今日無班次";
        return times.map(t => `<div>${t}</div>`).join("");
    }

    // ---------- 6. 事件綁定 ----------
    const searchBtn = document.getElementById('searchBtn');
    const setNowBtn = document.getElementById('setNowBtn');
    const viewFullBtn = document.getElementById('viewFullScheduleBtn');
    const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
    const settingsDiv = document.getElementById('advancedSettings');
    const resetBtn = document.getElementById('resetTimesBtn');
    const modal = document.getElementById('scheduleModal');
    const closeModal = document.querySelector('.close-btn');
    const showFullBtn = document.getElementById('showFullScheduleBtn');
    const fullRoute = document.getElementById('fullRouteSelect');
    const fullDay = document.getElementById('fullDayType');
    const fullResult = document.getElementById('fullScheduleResult');

    function doSearch() {
        try {
            updateFromUI();
            resetColorIndex();
            const start = document.getElementById('startPoint').value;
            const end = document.getElementById('endPoint').value;
            const day = document.getElementById('dayType').value;
            let timeStr = document.getElementById('queryTime').value;
            if (!timeStr) timeStr = "08:00";
            const mins = timeToMins(timeStr);
            const html = queryTrip(start, end, day, mins);
            document.getElementById('resultList').innerHTML = html;
        } catch(err) {
            document.getElementById('resultList').innerHTML = `<div class="error">錯誤: ${err.message}</div>`;
        }
    }

    searchBtn.addEventListener('click', doSearch);
    setNowBtn.addEventListener('click', () => {
        const now = new Date();
        const hh = now.getHours().toString().padStart(2,'0');
        const mm = now.getMinutes().toString().padStart(2,'0');
        document.getElementById('queryTime').value = `${hh}:${mm}`;
        doSearch();
    });
    viewFullBtn.addEventListener('click', () => modal.style.display = 'flex');
    closeModal.addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    showFullBtn.addEventListener('click', () => {
        const route = fullRoute.value;
        const day = fullDay.value;
        fullResult.innerHTML = showFullSchedule(route, day);
    });
    toggleSettingsBtn.addEventListener('click', () => {
        settingsDiv.classList.toggle('show');
    });
    resetBtn.addEventListener('click', () => {
        travel = {
            c9_home_pier:4, c9_home_north:16, c9_north_pier:9, c9_north_green:5,
            c9_green_pier:4, c9_green_home:8, ferry:25, db08r:35,
            o1r_pier_tc:23, o1r_tc_pier:25, o1r_tc_green:18, o1a_tc_green:18,
            o3r_pier_sb:20, o3r_sb_pier:20, o3r_sb_green:18, o3p_sb_green:18
        };
        transferBuffer = 3;
        saveSettings();
        for(let k in travel) {
            let el = document.getElementById(`t_${k}`);
            if(el) el.value = travel[k];
        }
        document.getElementById("transferBuffer").value = transferBuffer;
        doSearch();
    });
    document.getElementById("presetWeekday").onclick = () => alert("平日方案已套用 (預設值)");
    document.getElementById("presetSaturday").onclick = () => alert("週六方案已套用");
    document.getElementById("presetSunday").onclick = () => alert("假日方案已套用");

    loadSettings();
    doSearch();
})();
</script>
</body>
</html>
